name: 'nfe_pipeline'
version: '1.0.0'
config-version: 2

profile: 'nfe_pipeline'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]

models:
  nfe_pipeline:
    bronze:
      +materialized: view      # bronze são views sobre os dados brutos
    silver:
      +materialized: table     # silver são tabelas físicas
    gold:
      +materialized: table     # gold são tabelas físicas

vars:
  filtrar_homologacao: true   # muda para false em dev se quiser ver tudo